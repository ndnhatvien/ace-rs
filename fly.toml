# fly.toml app configuration file generated for ace-rs on 2026-06-16T07:42:00+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ace-rs'
primary_region = 'sin'

[env]
  ACE_BIND_ADDR = "0.0.0.0:8080"

[build]

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
